<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMug - Innovación Dinámica</title>
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>SmartMug</h1>
    </header>

    <main id="main-layout">
        <section class="hero">
            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1517191434949-5e90cd67d2b6?auto=format&fit=crop&q=80&w=600" alt="Taza Inteligente">
            </div>
            
            <article class="hero-content">
                <h2>Tecnología <br> en tu bebida</h2>
                <p>Mantén tu café a la temperatura perfecta durante horas. Control total desde tu smartphone con un diseño minimalista.</p>
                <button class="btn-primary">Comprar ahora</button>
            </article>
        </section>

        <section id="registro" class="form-container">
            <h3>Únete a la comunidad</h3>
            <form>
                <div class="input-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="input-group">
                    <label for="email">Correo:</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>
                <button type="submit" class="btn-submit">Suscribirme</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 InnovaTech. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
